name: ErpScoreboard
version: '1.0'
main: net.theerpsmp.plugin.CustomScoreboard
api-version: '1.21'
author: ErpieDev
description: Custom scoreboard system for play.theerpsmp.net

commands:
  sell:
    description: Open the sell inventory
    usalse: /sell
  shop:
    description: Open the shop GUI
    usage: /shop
  derpshop:
    description: Open the derpshop GUI
    usage: /derpshop
  spawn:
    description: Teleport to spawn protection area
    usage: /spawn
  auction:
    description: Open the auction GUI
    usage: /auction
  bh:
    description: Open the Bounty Hunter trading menu
    usage: /bh
  rtp:
    description: Random teleport to Overworld, Nether, or End
    usage: /rtp [overworld|nether|end]
  tpa:
    description: Send a teleport request to another player
    usage: /tpa <player>
  tpaccept:
    description: Accept a pending teleport request
    usage: /tpaccept
  pay:
    description: Pay Erpies to another player
    usage: /pay <amount> <player>
  stash:
    description: Spawn a shulker with elytra (OP only)
    usage: /stash
    permission: op
  erpies:
    description: Manage a player's Erpies (OP only)
    usage: /erpies <player> <amount>
    permission: op
  echokeys:
    description: Manage a player's Echo keys (OP only)
    usage: /echokeys <player> <reset|remove|add> <amount>
    permission: op
  crimsonkeys:
    description: Manage a player's crimson keys (OP only)
    usage: /crimsonkeys <player> <reset|remove|add> <amount>
    permission: op
  adminroom:
    description: Teleport to the admin room (OP only)
    usage: /adminroom
    permission: op
  erpitem:
    description: Spawn a custom item (OP only)
    usage: /erpitem <pickaxe|axe|bow|stick|crate|sword|pickaxe_lerp|mace|echo_sword|gateway|orbital_strike|wand> [player]
    permission: op
  sethome:
    description: Open sethome GUI to manage your homepoints
    usage: /sethome
  home:
    description: Teleport to one of your saved homepoints
    usage: /home
  afk:
    description: Teleport to the AFK zone to earn Derpies
    usage: /afk
  setting:
    description: Open settings GUI to manage options
    usage: /setting
  dupe:
    description: Duplicate the item in your hand (OP only)
    usage: /dupe @s <amount>
    permission: op
  viewhome:
    description: View another player's saved home points (OP only)
    usage: /viewhome <player>
    permission: op
  admin:
    description: Manage player operator status (Special only)
    usage: /admin <add|remove> <player>
  rules:
    description: Open the server rules book UI
    usage: /rules
  item:
    description: Save or load an item (OP only)
    usage: /item <load|save> <name>
    permission: op
  orders:
    description: Request to buy an item
    usage: /orders
  player:
    description: Perform administrative actions on a player
    usage: /player (ban/unban) (playername) (optional:days)
  gm:
    description: Change your gamemode (OP only)
    usage: /gm (s/c/a/spectator)
    permission: op
  gamemode:
    description: Change your gamemode (OP only)
    usage: /gamemode (s/c/a/spectator)
    permission: op
  xray:
    description: Enable xray mode (OP only)
    usage: /xray
    permission: op
  unxray:
    description: Disable xray mode (OP only)
    usage: /unxray
    permission: op
  keys:
    description: Manage player keys (OP only)
    usage: /keys (keys/echo/crimson) (add/remove/reset) (amount) (playername)
    permission: op
  copy:
    description: Copy a region between two points (OP only)
    usage: /copy <x1> <y1> <z1> <x2> <y2> <z2>
    permission: op
  paste:
    description: Paste the copied region relative to player position (OP only)
    usage: /paste
    permission: op
  setspawn:
    description: Set one of the spawnpoints in the spawn world (Special only)
    usage: /setspawn <1-5>
  dtp:
    description: Teleport to a specific dimension (OP only)
    usage: /dtp <dimension>
    permission: op
  nametag:
    description: Manage and choose your active name tag
    usage: /nametag
  addnametag:
    description: Add a nametag or all nametags (OP only)
    usage: /addnametag (nametag/all) [player]
    permission: op
  erpscoreboard:
    description: Modify erp scoreboard stats (OP only)
    usage: /erpscoreboard (h/e/d/k/ki/de) (add/remove/set/reset) (amount) [player]
    permission: op
  cut:
    description: Destroy/clear all blocks between two points (OP only)
    usage: /cut
    permission: op
  wandfill:
    description: Fill a space between 2 points (OP only)
    usage: /wandfill (material) (optional:hollow/replace) (if replace:material)
    permission: op
  wandcircle:
    description: Draw a hollow circle or semicircle between 2 points (OP only)
    usage: /wandcircle (material) (optional:semicircle)
    permission: op
  wandundo:
    description: Undo the last wand action performed (OP only)
    usage: /wandundo
    permission: op
  wandredo:
    description: Redo the last wand action undid (OP only)
    usage: /wandredo
    permission: op
  move:
    description: Move a structure between 2 points (OP only)
    usage: /move (up/down/north/south/east/west) (amount of blocks)
    permission: op
  wandstructure:
    description: Save or load a structure between 2 points (OP only)
    usage: /wandstructure (save/load) (name)
    permission: op
  offhand:
    description: Swap the items in your main hand and offhand (useful for Bedrock players)
    usage: /offhand
  enchantitem:
    description: Enchant the item in your hand with any enchantment and level (OP only)
    usage: /enchantitem (enchantment) (level)
    permission: op
  alwaysday:
    description: Toggle always day in a specific dimension (OP only)
    usage: /alwaysday (dimension) (true/false)
    permission: op
  maketeam:
    description: Create a new team
    usage: /maketeam <teamname>
  team:
    description: Open your team management GUI
    usage: /team
  requesteam:
    description: Request a player to join your team
    usage: /requesteam <playername>
  teamaccept:
    description: Accept a pending team invitation
    usage: /teamaccept
  dual:
    description: Invite a player to a duel in the bedrock arena
    usage: /dual <playername>
  dualaccept:
    description: Accept a pending duel challenge
    usage: /dualaccept